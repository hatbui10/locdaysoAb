<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN168 PRO - Hiển Thị Tên File</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --neon-yellow: #ffff00;
            --neon-blue: #0088ff;
            --bg-dark: #050505;
            --card-bg: #111114;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 30px 3px 0 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
            margin-top: 0;
            letter-spacing: 4px;
            font-size: 1.5rem;
        }

        /* Khu vực Upload */
        .btn-upload {
            display: block;
            min-height: 50px;
            background: #1a1a1a;
            border: 1px dashed #444;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            color: #aaa;
            margin-bottom: 20px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }
        .btn-upload:hover {
            border-color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
        }

        /* Ô nhập số */
        input[type="number"] {
            width: 100%;
            padding: 18px;
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            color: var(--neon-cyan);
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: 1px solid transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-filter { background: var(--neon-cyan); color: #000; }
        .btn-download { background: transparent; border-color: var(--neon-pink); color: var(--neon-pink); }
        .btn-download:hover { background: var(--neon-pink); color: #fff; }

        /* Kết quả */
        #resultContainer {
            margin-top: 20px;
            background: #000;
            border-radius: 10px;
            border: 1px solid #222;
            max-height: 450px;
            overflow-y: auto;
        }

        .result-item {
            padding: 12px 15px;
            border-bottom: 1px solid #151515;
            font-family: 'Consolas', monospace;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
        }

        .color-yellow { color: var(--neon-yellow) !important; text-shadow: 0 0 8px rgba(255,255,0,0.4); }
        .color-blue { color: var(--neon-blue) !important; text-shadow: 0 0 8px rgba(0,136,255,0.4); }
        .match-val { color: var(--neon-pink); font-weight: bold; }
        .sequence-val { color: #666; letter-spacing: 1px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>VN168 <span style="color: #fff;">PRO</span></h2>
    
    <label class="btn-upload" id="uploadLabel">
        <input type="file" id="fileInput" style="display:none" accept=".txt">
        <span id="fileNameDisplay">BẤM ĐỂ TẢI FILE (.TXT)</span>
    </label>

    <input type="number" id="searchInput" inputmode="numeric" placeholder="NHẬP SỐ" autofocus>

    <div class="button-group">
        <button class="btn-filter" onclick="handleFilter()">LỌC DỮ LIỆU</button>
        <button class="btn-download" onclick="downloadResult()">TẢI KẾT QUẢ</button>
    </div>

    <div id="resultContainer"></div>
</div>

<script>
    let rawData = localStorage.getItem('vn168_data') || "";
    let lastResults = [];

    // Tự động load khi mở trang
    window.onload = () => {
        const savedFileName = localStorage.getItem('vn168_filename');
        if (rawData && savedFileName) {
            updateFileNameUI(savedFileName);
        }
        document.getElementById('searchInput').focus();
    };

    // Hàm cập nhật chữ trên nút Upload
    function updateFileNameUI(name) {
        const display = document.getElementById('fileNameDisplay');
        display.innerText = "FILE: " + name;
        display.style.color = "var(--neon-cyan)";
        display.style.fontWeight = "bold";
    }

    // Xử lý chọn file mới
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            rawData = e.target.result.replace(/\s+/g, '');
            // Lưu cả dữ liệu và tên file vào bộ nhớ máy
            localStorage.setItem('vn168_data', rawData);
            localStorage.setItem('vn168_filename', file.name);
            
            updateFileNameUI(file.name);
        };
        reader.readAsText(file);
    });

    function checkPattern(str) {
        if (str.length < 6) return "";
        const numbers = str.substring(0, 6).split('').map(Number);
        if (numbers.every(n => n >= 5)) return "color-yellow";
        if (numbers.every(n => n < 5)) return "color-blue";
        return "";
    }

    function handleFilter() {
        const searchVal = document.getElementById('searchInput').value;
        const container = document.getElementById('resultContainer');
        
        if (!rawData) return alert("Vui lòng tải file dữ liệu trước!");
        if (!searchVal) return;

        let resultsHTML = "";
        lastResults = [];
        let pos = rawData.indexOf(searchVal);

        while (pos !== -1) {
            let nextTen = rawData.substring(pos + searchVal.length, pos + searchVal.length + 10);
            
            if (nextTen.length > 0) {
                const colorClass = checkPattern(nextTen);
                let f = nextTen;
                if (nextTen.length === 10) {
                    f = `${nextTen.substring(0,3)} ${nextTen.substring(3,6)} ${nextTen.substring(6,10)}`;
                }
                
                lastResults.push(`${searchVal} ${f}`);
                resultsHTML += `
                    <div class="result-item">
                        <span class="match-val">${searchVal}</span>
                        <span class="sequence-val ${colorClass}">${f}</span>
                    </div>`;
            }
            pos = rawData.indexOf(searchVal, pos + 1);
        }

        container.innerHTML = resultsHTML || '<div style="padding:20px; color:red; text-align:center;">KHÔNG TÌM THẤY</div>';
        document.getElementById('searchInput').select();
    }

    function downloadResult() {
        if (lastResults.length === 0) return alert("Không có kết quả để tải!");
        const content = lastResults.join("\n");
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        const time = new Date().toLocaleTimeString().replace(/:/g, '-');
        a.href = window.URL.createObjectURL(blob);
        a.download = `KetQua_${time}.txt`;
        a.click();
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleFilter();
    });
</script>

</body>
</html>
