<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzer v23.0 - N-Right Layout</title>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-container: #161616;
            --text-main: #e0e0e0;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --surface: #222222;
            --success: #4caf50;
            --warning: #ff9800;
            --blue-light: #03a9f4;
        }

        body { font-family: 'Consolas', 'Monaco', monospace; padding: 10px; background: var(--bg-body); color: var(--text-main); margin: 0; }
        .container { max-width: 950px; margin: auto; background: var(--bg-container); padding: 15px; border-radius: 12px; border: 1px solid #333; }
        
        .top-controls { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 15px; 
            background: var(--surface); 
            padding: 10px 15px; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            border: 1px solid #444;
            flex-wrap: wrap;
        }

        .input-section { display: flex; align-items: center; gap: 12px; }
        
        /* Các ô hiển thị MM và Ab */
        .display-group { display: flex; align-items: center; gap: 5px; background: #000; padding: 5px 10px; border-radius: 6px; border: 1px solid #333; }
        .label-sm { font-size: 0.75rem; color: #666; text-transform: uppercase; }
        
        input.readonly-pad { 
            background: transparent; border: none; color: var(--secondary); 
            width: 50px; text-align: center; font-size: 1.4rem; font-weight: bold; 
            pointer-events: none; outline: none;
        }

        /* Ô nhập N chính - Nằm bên phải */
        .n-box { display: flex; align-items: center; gap: 8px; border-left: 1px solid #444; padding-left: 15px; }
        input.n-input {
            background: #222; border: 2px solid var(--primary); color: #fff;
            padding: 8px; border-radius: 6px; width: 50px; text-align: center;
            font-size: 1.6rem; font-weight: bold; outline: none; box-shadow: 0 0 10px rgba(187, 134, 252, 0.2);
        }

        .mini-counters { 
            display: flex; gap: 15px; background: #000; padding: 10px 15px; 
            border-radius: 6px; border: 1px solid #333; font-weight: bold; font-size: 1.2rem;
        }
        .c-yellow { color: var(--warning); }
        .c-blue { color: var(--blue-light); }

        #extractedText {
            width: 100%; height: 500px; background: #000; color: var(--secondary);
            border: 1px solid #444; border-radius: 8px; padding: 12px;
            font-family: 'Consolas', monospace; font-size: 1.3rem; resize: vertical; line-height: 1.5;
            box-sizing: border-box; margin-top: 5px;
        }

        .copy-btn { background: var(--success); color: white; width: 100%; margin-top: 10px; padding: 15px; font-size: 1.1rem; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .clear-btn { background: #444; color: #aaa; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .stats-footer { display: flex; gap: 15px; margin-top: 10px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-controls">
        <div class="input-section">
            <div class="display-group">
                <span class="label-sm">MM</span>
                <input type="text" id="inputMM" class="readonly-pad" value="--" readonly>
                <span style="color:#333">|</span>
                <span class="label-sm">Ab</span>
                <input type="text" id="inputAb" class="readonly-pad" value="--" readonly>
            </div>

            <div class="n-box">
                <b style="color:var(--primary); font-size: 0.9rem;">NHẬP:</b>
                <input type="tel" id="inputN" class="n-input" placeholder="?" maxlength="1" inputmode="numeric" autocomplete="off">
            </div>
        </div>

        <div class="mini-counters">
            <span class="c-yellow">🟡 <span id="countYellow">0</span></span>
            <span class="c-blue">🔵 <span id="countBlue">0</span></span>
        </div>
        
        <button class="clear-btn" onclick="clearData()">Xóa nhớ</button>
    </div>

    <div style="display: flex; justify-content: space-between; padding: 0 5px; margin-bottom: 5px;">
        <input type="file" id="fileInput" accept=".txt" style="font-size: 0.8rem; color: #555;">
        <span style="font-size: 0.75rem; color: #444;">Gõ số vào ô vuông để dịch trái ➔➔</span>
    </div>
    
    <textarea id="extractedText" readonly placeholder="Kết quả sẽ tự cập nhật khi bạn gõ số vào ô NHẬP..."></textarea>
    
    <button class="copy-btn" onclick="copyExtracted()">SAO CHÉP KẾT QUẢ</button>

    <div class="stats-footer">
        <span>Tổng chữ số: <b id="totalCount" style="color:#888">0</b></span>
        <span>Mẫu 9 số: <b id="groupCount" style="color:#888">0</b></span>
    </div>
</div>

<script>
    const STORAGE_KEY = 'sequence_analyzer_data';
    let rawData = "";
    let currentNumbers = []; 

    const nInput = document.getElementById('inputN');
    const mmDisplay = document.getElementById('inputMM');
    const abDisplay = document.getElementById('inputAb');

    window.onload = () => {
        rawData = localStorage.getItem(STORAGE_KEY) || "";
        if(rawData) processData(rawData);
        nInput.focus();
        
        // Giữ focus ô N khi bấm ra ngoài
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'fileInput' && e.target.className !== 'copy-btn') {
                nInput.focus();
            }
        });
    };

    nInput.addEventListener('input', function() {
        const val = this.value.trim();
        if (val !== "" && !isNaN(val)) {
            currentNumbers.push(val);
            if (currentNumbers.length > 4) currentNumbers.shift();
            
            updateDisplay();

            if (currentNumbers.length === 4) {
                extractSequences();
            }
        }
        this.value = ""; // Xóa ô N ngay lập tức
    });

    function updateDisplay() {
        // currentNumbers: [M1, M2, A1, A2]
        let m1 = currentNumbers[currentNumbers.length - 4] || "-";
        let m2 = currentNumbers[currentNumbers.length - 3] || "-";
        let a1 = currentNumbers[currentNumbers.length - 2] || "-";
        let a2 = currentNumbers[currentNumbers.length - 1] || "-";

        mmDisplay.value = (m1 + m2).replace(/-/g, "");
        abDisplay.value = (a1 + a2).replace(/-/g, "");
        
        if (mmDisplay.value === "") mmDisplay.value = "--";
        if (abDisplay.value === "") abDisplay.value = "--";
    }

    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        rawData = await file.text();
        localStorage.setItem(STORAGE_KEY, rawData);
        processData(rawData);
        currentNumbers = [];
        updateDisplay();
        nInput.focus();
    });

    function extractSequences() {
        const mm = mmDisplay.value;
        const ab = abDisplay.value;
        const textArea = document.getElementById('extractedText');

        if (mm.length < 2 || ab.length < 2) return;

        const nums = rawData.replace(/\D/g, '').split('').map(Number);
        let blocks = { AA: [], AB: [], BB: [], BA: [] };
        const isA = (n) => n >= 5;
        const isB = (n) => n < 5;

        for (let i = 0; i <= nums.length - 8; i++) {
            if (nums[i] === parseInt(mm[0]) && nums[i+1] === parseInt(mm[1])) {
                let d = nums.slice(i, i + 8);
                let lastFour = d.slice(4);
                let colorTag = "⚪ ";
                if (lastFour.every(n => isA(n))) colorTag = "🟡 ";
                else if (lastFour.every(n => isB(n))) colorTag = "🔵 ";

                let formatted = `${colorTag}${d[0]}${d[1]} - ${d[2]}${d[3]} - ${d[4]}${d[5]} ${d[6]}${d[7]}`;
                if (isA(d[2]) && isA(d[3])) blocks.AA.push(formatted);
                else if (isA(d[2]) && isB(d[3])) blocks.AB.push(formatted);
                else if (isB(d[2]) && isB(d[3])) blocks.BB.push(formatted);
                else if (isB(d[2]) && isA(d[3])) blocks.BA.push(formatted);
            }
        }

        const n2 = parseInt(ab[0]), n3 = parseInt(ab[1]);
        let target = (isA(n2) && isA(n3)) ? "AA" : (isA(n2) && isB(n3)) ? "AB" : (isB(n2) && isB(n3)) ? "BB" : "BA";
        
        textArea.value = blocks[target].length > 0 
            ? `[ KHỐI ${target} ] (MM:${mm} Ab:${ab})\n` + blocks[target].join('\n') 
            : `KHÔNG CÓ DỮ LIỆU KHỐI ${target} CHO MM:${mm} Ab:${ab}`;

        updateCounters(textArea.value);
    }

    function updateCounters(text) {
        document.getElementById('countYellow').innerText = (text.match(/🟡/g) || []).length;
        document.getElementById('countBlue').innerText = (text.match(/🔵/g) || []).length;
    }

    function processData(content) {
        const nums = content.replace(/\D/g, '').split('').map(Number);
        if (nums.length === 0) return;
        let groupCount = 0;
        const isA = (n) => n >= 5, isB = (n) => n < 5;
        for (let i = 0; i <= nums.length - 9; i++) {
            let match = false;
            if (isA(nums[i]) && isA(nums[i+1]) && isB(nums[i+2]) && isB(nums[i+3]) && isA(nums[i+4]) && isB(nums[i+5]) && isA(nums[i+6]) && isB(nums[i+7]) && isA(nums[i+8])) match = true;
            else if (isB(nums[i]) && isA(nums[i+1]) && isB(nums[i+2]) && isA(nums[i+3]) && isB(nums[i+4]) && isA(nums[i+5]) && isB(nums[i+6]) && isA(nums[i+7]) && isB(nums[i+8])) match = true;
            else if (isA(nums[i]) && isB(nums[i+1]) && isA(nums[i+2]) && isB(nums[i+3]) && isA(nums[i+4]) && isB(nums[i+5]) && isA(nums[i+6]) && isB(nums[i+7]) && isA(nums[i+8])) match = true;
            else if (isB(nums[i]) && isB(nums[i+1]) && isA(nums[i+2]) && isA(nums[i+3]) && isB(nums[i+4]) && isA(nums[i+5]) && isB(nums[i+6]) && isA(nums[i+7]) && isB(nums[i+8])) match = true;
            if (match) { groupCount++; i += 8; }
        }
        document.getElementById('totalCount').innerText = nums.length.toLocaleString();
        document.getElementById('groupCount').innerText = groupCount.toLocaleString();
    }

    function copyExtracted() {
        const textArea = document.getElementById('extractedText');
        if (!textArea.value) return;
        textArea.select();
        document.execCommand('copy');
        alert("Đã sao chép!");
    }

    function clearData() {
        if(confirm("Xóa sạch dữ liệu?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
