<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lọc số đa năng</title>

<style>
:root {
  --btn-width: 80%;
  --btn-height: 45px;

  --input-width: 100%;
  --input-height: 45px;

  --radius: 12px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 600px;
  background: #111827;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUT */

input[type="text"] {
  width: var(--input-width);
  height: var(--input-height);
  margin-top: 10px;
  border-radius: var(--radius);
  border: 1px solid #374151;
  background: #1f2937;
  color: #fff;

  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center; /* căn giữa chữ */

  outline: none;
}

input:focus {
  border-color: #6366f1;
}

/* BUTTON GROUP */
.btn-group {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* BUTTON */
button {
  width: var(--btn-width);
  height: var(--btn-height);
  margin-top: 10px;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff;
  font-weight: bold;
  cursor: pointer;

  display: flex;
  justify-content: center;
  align-items: center;

  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 20px rgba(99,102,241,0.4);
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 250px;
  margin-top: 15px;
  border-radius: var(--radius);
  border: 1px solid #374151;
  background: #1f2937;
  color: #fff;
  padding: 10px;
  resize: none;
  font-family: monospace;
}

  
  .hh {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

  
label {
  margin-top: 15px;
  display: block;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔢 Lọc số từ file</h2>
  <div class="hh">
  <input type="file" id="fileInput">
  </div>
  <label>Nhập số bắt đầu</label>
  <input type="text" id="filterInput" value="3">

  <div class="btn-group">
    <button onclick="processFile()">🔍 Lọc số</button>
    <button onclick="copyResult()">📋 Copy</button>
    <button onclick="downloadFile()">⬇️ Xuất file</button>
  </div>

  <textarea id="output" placeholder="Kết quả sẽ hiển thị ở đây..."></textarea>
</div>

<script>
let finalText = "";

function processFile() {
  const file = document.getElementById("fileInput").files[0];
  const filterValue = document.getElementById("filterInput").value;

  if (!file) {
    alert("Chưa chọn file 😐");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;

    const numbers = text.match(/\\d+/g) || [];

    const filtered = numbers.filter(num => num.startsWith(filterValue));

    let lines = [];
    for (let i = 0; i < filtered.length; i += 5) {
      lines.push(filtered.slice(i, i + 5).join(", "));
    }

    finalText = lines.join("\\n");
    document.getElementById("output").value = finalText;
  };

  reader.readAsText(file);
}

function copyResult() {
  const text = document.getElementById("output");
  text.select();
  document.execCommand("copy");
  alert("Đã copy 😎");
}

function downloadFile() {
  const blob = new Blob([finalText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ketqua.txt";
  a.click();
}
</script>

</body>
</html>
