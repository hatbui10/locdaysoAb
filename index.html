<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lọc số - Tách số sau Input</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 500px;
  background: #111827;
  padding: 20px;
  border-radius: 20px;
}

input, button {
  width: 80%;
  margin: 10px auto 0;
  display: block;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

input {
  text-align: center;
  font-size: 22px;
  letter-spacing: 5px;
  background: #1f2937;
  color: #fff;
}

button {
  background: #6366f1;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.output-box {
  width: 80%;
  height: 300px;
  margin: 15px auto 0;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #000;
  overflow-y: auto;
  font-family: monospace;
  white-space: pre; /* Quan trọng để thẳng cột */
  color: #ccc;
}

.highlight {
  color: #94a3b8; /* Số gốc mờ đi chút */
}

.next-numbers {
  color: #00ffcc; /* Số phía sau nổi bật */
  font-weight: bold;
}

.info-text {
  text-align: center;
  font-size: 0.9em;
  color: #94a3b8;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2 style="text-align:center">🔢 Lọc & Tách Số Sau</h2>

  <input type="file" id="fileInput" accept=".txt">

  <input type="tel"
         id="filterInput"
         placeholder="Nhập số"
         maxlength="2">
         
         <div id="abResult" class="output-box" style="height:80px;color:#00ffcc;">
  Kết quả AB sẽ hiện ở đây...
</div>


  <button onclick="processFile()">🔍 Lọc & Tách</button>
  <button onclick="copyResult()">📋 Copy</button>
  <button onclick="downloadFile()">⬇️ Xuất file</button>

  <div id="status" class="info-text">Chưa có dữ liệu</div>
  <div id="output" class="output-box">Kết quả sẽ hiện ở đây...</div>
</div>

<script>
let uniqueNumbers = []; 
let finalText = "";

document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    const text = event.target.result;
    const allNumbers = text.split(/\s+/).filter(s => s.length === 10);
    uniqueNumbers = [...new Set(allNumbers)];
    document.getElementById("status").innerText = `Đã nạp ${uniqueNumbers.length} số (đã lọc trùng)`;
    document.getElementById("filterInput").focus();
  };
  reader.readAsText(file);
});

function processFile() {
  const keyword = document.getElementById("filterInput").value;
  const output = document.getElementById("output");

  if (keyword.length === 0) {
    alert("Vui lòng nhập số!");
    return;
  }

  let htmlResult = "";
  let textResult = "";
  let count = 0;

  uniqueNumbers.forEach(num => {
    if (num.includes(keyword)) {
      // Tìm vị trí đầu tiên của keyword
      const index = num.indexOf(keyword);
      // Lấy phần phía sau keyword
      const after = num.substring(index + keyword.length);
      
      if (after.length > 0) {
        // Căn lề: Dùng padEnd để dãy số gốc luôn dài 12 ký tự, tạo cột thẳng
        const padding = num.padEnd(12, " ");
        
        htmlResult += padding + `➔ <span class="next-numbers">${after}</span>\n`;
        textResult += padding + `-> ${after}\n`;
        count++;
      }
    }
  });
  
  
  
  // ====== XỬ LÝ AB ======
let patterns = [];

uniqueNumbers.forEach(num => {
  if (num.includes(keyword)) {
    const index = num.indexOf(keyword);
    const after = num.substring(index + keyword.length);

    if (after.length >= 4) {
      const first4 = after.slice(0,4);
      const ab = first4.split('').map(x => x < 5 ? 'a' : 'b').join('');
      patterns.push(ab);
    }
  }
});

// loại trùng
patterns = [...new Set(patterns)];

// tất cả khả năng
const allAB = [
  "aaaa","aaab","aaba","aabb",
  "abaa","abab","abba","abbb",
  "baaa","baab","baba","babb",
  "bbaa","bbab","bbba","bbbb"
];

// check điều kiện “đụng hết”
function isValid(p, arr){
  return arr.every(target => {
    for(let i=0;i<4;i++){
      if(p[i] === target[i]) return true;
    }
    return false;
  });
}

let found = allAB.filter(p => isValid(p, patterns));

// hiển thị
let abBox = document.getElementById("abResult");
if (abBox) {
  abBox.innerText = found.length
    ? "Pattern hợp lệ:\n" + found.join("  ")
    : "Không có pattern phù hợp";
}


  finalText = textResult.trim();
  output.innerHTML = htmlResult || "Không tìm thấy số nào có phần phía sau.";
  document.getElementById("status").innerText = `Tìm thấy ${count} kết quả cho "${keyword}"`;
}


function toAB(str){
  return str.split('').map(x => x < 5 ? 'a' : 'b').join('');
}

// kiểm tra 1 pattern có match hết không
function isValid(p, arr){
  return arr.every(target => {
    let matchCount = 0;

    for(let i = 0; i < 4; i++){
      if(p[i] === target[i]) matchCount++;
    }

    return matchCount >= 2; // 👈 chỗ quan trọng
  });
}


function copyResult() {
  if (!finalText) return;
  navigator.clipboard.writeText(finalText).then(() => alert("Đã copy!"));
}

function downloadFile() {
  if (!finalText) return;
  const blob = new Blob([finalText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ketqua_tach_so.txt";
  a.click();
}
</script>

</body>
</html>
