<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lọc số - Tách số sau Input</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 500px;
  background: #111827;
  padding: 20px;
  border-radius: 20px;
}

input, button {
  width: 80%;
  margin: 10px auto 0;
  display: block;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

input {
  text-align: center;
  font-size: 22px;
  letter-spacing: 5px;
  background: #1f2937;
  color: #fff;
}

button {
  background: #6366f1;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.output-box {
  width: 80%;
  height: 300px;
  margin: 15px auto 0;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #000;
  overflow-y: auto;
  font-family: monospace;
  white-space: pre;
  color: #ccc;
}

.next-numbers {
  color: #00ffcc;
  font-weight: bold;
}

.info-text {
  text-align: center;
  font-size: 0.9em;
  color: #94a3b8;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2 style="text-align:center">🔢 Lọc & Tách Số Sau</h2>

  <input type="file" id="fileInput" accept=".txt">
  <div id="abResult" class="output-box" style="height:100px;color:#00ffcc;">
    Kết quả AB sẽ hiện ở đây...
  </div>

  <input type="tel" id="filterInput" placeholder="Nhập số" maxlength="2">

  <button onclick="processFile()">🔍 Lọc & Tách</button>
  <button onclick="copyResult()">📋 Copy</button>
  <button onclick="downloadFile()">⬇️ Xuất file</button>

  <div id="status" class="info-text">Chưa có dữ liệu</div>

  <div id="output" class="output-box">Kết quả sẽ hiện ở đây...</div>

  </div>

<script>
let uniqueNumbers = [];
let finalText = "";

// đọc file
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    const text = event.target.result;
    const allNumbers = text.split(/\s+/).filter(s => s.length === 10);
    uniqueNumbers = [...new Set(allNumbers)];
    document.getElementById("status").innerText =
      `Đã nạp ${uniqueNumbers.length} số`;
  };
  reader.readAsText(file);
});

// tạo tất cả pattern a/b độ dài n
function generateAB(n){
  let result = [];
  let total = Math.pow(2, n);

  for(let i = 0; i < total; i++){
    let bin = i.toString(2).padStart(n, '0');
    let str = bin.replace(/0/g, 'a').replace(/1/g, 'b');
    result.push(str);
  }

  return result;
}

// kiểm tra ≥2 vị trí trùng
function isValid(p, arr){
  return arr.every(target => {
    let match = 0;

    for(let i = 0; i < 6; i++){
      if(p[i] === target[i]) match++;
    }

    return match >= 2;
  });
}

function processFile() {
  const keyword = document.getElementById("filterInput").value;
  const output = document.getElementById("output");
  const abBox = document.getElementById("abResult");

  if (!keyword) {
    alert("Nhập số đi 😑");
    return;
  }

  let htmlResult = "";
  let textResult = "";
  let count = 0;
  let patterns = [];

  uniqueNumbers.forEach(num => {
    if (num.includes(keyword)) {
      const index = num.indexOf(keyword);
      const after = num.substring(index + keyword.length);

      if (after.length > 0) {
        const padding = num.padEnd(12, " ");
        htmlResult += padding + `➔ <span class="next-numbers">${after}</span>\n`;
        textResult += padding + `-> ${after}\n`;
        count++;
      }

      // xử lý AB
      if (after.length >= 6) {
        const first6 = after.slice(0,6);
        const ab = first6.split('').map(x => x < 5 ? 'a' : 'b').join('');
        patterns.push(ab);
      }
    }
  });

  patterns = [...new Set(patterns)];

  if(patterns.length === 0){
    abBox.innerText = "Không có dữ liệu để phân tích";
  } else {
    const allAB = generateAB(6);
    const found = allAB.filter(p => isValid(p, patterns));

    abBox.innerText = found.length
      ? "Pattern hợp lệ:\n" + found.join("  ")
      : "Không có pattern phù hợp 😢";
  }

  finalText = textResult.trim();
  output.innerHTML = htmlResult || "Không tìm thấy";
  document.getElementById("status").innerText =
    `Tìm thấy ${count} kết quả`;
}

// copy
function copyResult() {
  if (!finalText) return;
  navigator.clipboard.writeText(finalText);
}

// tải file
function downloadFile() {
  if (!finalText) return;
  const blob = new Blob([finalText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ketqua.txt";
  a.click();
}
</script>

</body>
</html>
