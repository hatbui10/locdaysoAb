<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phân Tích Số Theo Khối - Ultra Dark Mode</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 20px; 
            background: linear-gradient(135deg, #000000 0%, #1a1a1d 50%, #0b0b0b 100%); 
            background-attachment: fixed; 
            min-height: 100vh; 
            color: #c5c6c7; 
        }

        .box { 
            background: #111111; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            color: #c5c6c7; 
            margin-top: 20px;
            border: 1px solid #222;
        }

        h2 { color: #66fcf1; text-align: center; text-transform: uppercase; letter-spacing: 2px; }

        .input-group { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #45a29e; }
        
        input[type="file"] { 
            width: 100%; padding: 12px; 
            border: 1px dashed #333; 
            border-radius: 6px; 
            background: #0b0b0b; 
            color: #66fcf1;
            cursor: pointer;
        }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        
        .btn-run { background: #1f2833; color: #66fcf1; border: 1px solid #66fcf1; }
        .btn-run:hover { background: #66fcf1; color: #0b0b0b; }
        
        .btn-down { background: #28a745; color: white; display: none; }
        
        #output { 
            margin-top: 20px; 
            background: #050505; 
            padding: 20px; 
            border-radius: 8px; 
            max-height: 800px; 
            overflow-y: auto;
            border: 1px solid #333;
            line-height: 1.2; 
            font-family: 'Courier New', monospace;
            font-size: 20px; 
            letter-spacing: 2px;
            color: #00ff41; 
        }

        .block-header { 
            background: #1a1a1a; 
            color: #45a29e; 
            padding: 12px; 
            margin: 35px 0 12px 0; 
            border-radius: 4px; 
            font-size: 22px; 
            font-weight: bold;
            border-left: 4px solid #45a29e;
        }

        .line { white-space: nowrap; margin-bottom: 4px; border-bottom: 1px solid #111; }
        .target-digit { color: #0b0b0b; font-weight: bold; background: #c5c6c7; padding: 0 6px; border-radius: 2px; margin-right: 5px; }
        
        /* LOGIC MÀU SẮC VÀ GẠCH NGANG */
        .q-bg-red { background-color: white !important; color: red !important; }
        
        .q-bg-blue { 
            background-color: #002b5c !important; 
            color: #ffffff !important; 
            /* Gạch ngang 0.2px */
            text-decoration: line-through;
            text-decoration-color: #ffffff;
            text-decoration-thickness: 0.2px;
        }
        
        .q-bg-yellow { background-color: #b8860b !important; color: #000000 !important; font-weight: bold; }
        
        .status { color: #66fcf1; font-weight: bold; margin-top: 10px; font-size: 0.9em; }

        .legend { 
            font-size: 13px; 
            background: #0b0b0b; 
            padding: 12px; 
            border: 1px solid #222; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            color: #888;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Phân Tích Khối 0-9 (Dark Edition)</h2>
    <div class="legend">
        <strong>Chế độ hiển thị tối ưu:</strong><br>
        - <span style="background:white; color:red; padding:1px 4px">Trắng-Đỏ</span>: Cụm Q ≥ 5 | 
        - <span style="background:#002b5c; color:white; padding:1px 4px; text-decoration: line-through;">Xanh-Gạch</span>: Cụm Q < 5 (Gạch ngang 0.2px)<br>
        - <span style="background:#b8860b; color:black; padding:1px 4px">Vàng Đồng</span>: Đối nghịch 100% dòng kề.
    </div>
    
    <div class="input-group">
        <label>Dữ liệu đầu vào (.txt):</label>
        <input type="file" id="fileInput" accept=".txt">
        <div id="fileStatus" class="status"></div>
    </div>

    <div class="btn-group">
        <button class="btn-run" onclick="processData()">XỬ LÝ DỮ LIỆU</button>
        <button id="downBtn" class="btn-down" onclick="downloadTxt()">XUẤT FILE (.TXT)</button>
    </div>

    <div id="output">Sẵn sàng...</div>
</div>

<script>
    let finalRawText = "";
    const KEY = 'block_analysis_v8';

    function isFullOpp(lA, lB) {
        if (!lA || !lB) return false;
        for (let p = 1; p <= 6; p++) {
            const nA = parseInt(lA[p]), nB = parseInt(lB[p]);
            if (!((nA >= 5 && nB < 5) || (nA < 5 && nB >= 5))) return false;
        }
        return true;
    }

    function processData() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result.replace(/[^0-9]/g, '');
                localStorage.setItem(KEY, content);
                execute(content);
            };
            reader.readAsText(fileInput.files[0]);
        } else {
            const saved = localStorage.getItem(KEY);
            if (saved) execute(saved);
            else alert("Vui lòng chọn file!");
        }
    }

    function execute(data) {
        const output = document.getElementById('output');
        output.innerHTML = "";
        finalRawText = "";
        let totalLines = 0;

        for (let digit = 0; digit <= 9; digit++) {
            let target = digit.toString();
            let lines = [];
            let i = 0;

            while (i < data.length) {
                let start = data.indexOf(target, i);
                if (start === -1) break;
                let nextPos = data.indexOf(target, start + 7);
                if (nextPos !== -1) {
                    lines.push(data.substring(start, nextPos));
                    i = nextPos;
                } else {
                    let last = data.substring(start);
                    if (last.length >= 7) lines.push(last);
                    break;
                }
            }

            if (lines.length > 0) {
                totalLines += lines.length;
                const header = document.createElement('div');
                header.className = 'block-header';
                header.textContent = `KHỐI SỐ: ${target}`;
                output.appendChild(header);

                finalRawText += `--- KHỐI SỐ: ${target} ---\n` + lines.join('\n') + "\n\n";

                for (let n = 0; n < lines.length; n++) {
                    const cur = lines[n];
                    const qSeq = cur.substring(1, 7);
                    let bgClass = "";

                    if (isFullOpp(cur, lines[n+1]) || isFullOpp(cur, lines[n-1])) {
                        bgClass = "q-bg-yellow";
                    } else {
                        let allHigh = true, allLow = true;
                        for(let char of qSeq) {
                            if(parseInt(char) < 5) allHigh = false;
                            if(parseInt(char) >= 5) allLow = false;
                        }
                        if (allHigh) bgClass = "q-bg-red";
                        else if (allLow) bgClass = "q-bg-blue";
                    }

                    const div = document.createElement('div');
                    div.className = 'line';
                    div.innerHTML = `<span class="target-digit">${cur[0]}</span><span class="${bgClass}">${qSeq}</span>${cur.substring(7)}`;
                    output.appendChild(div);
                }
            }
        }
        document.getElementById('downBtn').style.display = totalLines ? "block" : "none";
        document.getElementById('fileStatus').textContent = `Hoàn tất xử lý ${totalLines} dòng.`;
    }

    function downloadTxt() {
        const blob = new Blob([finalRawText], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "ket_qua_phan_tich_theo_khoi.txt";
        a.click();
    }

    window.onload = () => {
        if (localStorage.getItem(KEY)) document.getElementById('fileStatus').textContent = "Dữ liệu cũ đã sẵn sàng.";
    };
</script>

</body>
</html>
