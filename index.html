<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Format JSON Theo Nhóm</title>
<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}
textarea{
  width:100%;
  height:250px;
  margin-bottom:20px;
  padding:10px;
  border-radius:8px;
  font-size:14px;
}
button{
  padding:10px 20px;
  font-weight:bold;
  cursor:pointer;
}
pre{
  background:#222;
  padding:15px;
  border-radius:8px;
  overflow-x:auto;
  white-space:pre;
}
</style>
</head>
<body>

<h2>Dán JSON vào đây</h2>
<textarea id="input"></textarea>
<button onclick="processData()">Chuẩn hóa</button>

<h2>Kết quả</h2>
<pre id="output"></pre>

<script>
function extractNumbers(str){
  return str.match(/\d{3}/g) || [];
}

function groupAndFormat(arr){
  const groups = {};

  arr.forEach(num=>{
    const prefix = num[0];
    if(!groups[prefix]) groups[prefix]=[];
    groups[prefix].push(num);
  });

  let result = "";
  Object.keys(groups).sort().forEach(prefix=>{
    result += "    ";
    result += groups[prefix]
      .sort((a,b)=>Number(a)-Number(b))
      .map(n=>`"${n}"`)
      .join(",");
    result += ",\n\n";
  });

  return result.trim().replace(/,$/,"");
}

function processData(){

  const raw = document.getElementById("input").value;
  const allNumbers = extractNumbers(raw);

  let unique = [...new Set(allNumbers)];
  unique.sort((a,b)=>Number(a)-Number(b));

  // Tách 2 nhóm theo mẫu có sẵn trong JSON gốc
  const dataMatch = raw.match(/"data"\s*:\s*\[(.*?)\]/s);
  const data2Match = raw.match(/"data2"\s*:\s*\[(.*?)\]/s);

  if(!dataMatch || !data2Match){
    document.getElementById("output").textContent="Không tìm thấy data hoặc data2";
    return;
  }

  let data = [...new Set(extractNumbers(dataMatch[1]))];
  let data2 = [...new Set(extractNumbers(data2Match[1]))];

  // loại trùng giữa 2
  data2 = data2.filter(n=>!data.includes(n));

  data.sort((a,b)=>Number(a)-Number(b));
  data2.sort((a,b)=>Number(a)-Number(b));

  const finalJson = `{
  "data": [

${groupAndFormat(data)}

  ],

  "data2": [

${groupAndFormat(data2)}

  ]
}`;

  document.getElementById("output").textContent = finalJson;
}
</script>

</body>
</html>
