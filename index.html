<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lọc số 10 chữ số</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 600px;
  background: #111827;
  padding: 20px;
  border-radius: 20px;
}

input, textarea, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

input {
  text-align: center;
  font-size: 22px;
  letter-spacing: 5px;
  background: #1f2937;
  color: #fff;
}

textarea {
  height: 250px;
  background: #000;
  color: #0f0;
  font-family: monospace;
}

button {
  background: #6366f1;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.highlight {
  color: #ff3b3b;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔢 Lọc số</h2>

  <input type="file" id="fileInput">

  <input type="tel"
         id="filterInput"
         placeholder="Nhập 2 số (00-99)"
         maxlength="2">

  <button onclick="processFile()">🔍 Lọc</button>
  <button onclick="copyResult()">📋 Copy</button>
  <button onclick="downloadFile()">⬇️ Xuất file</button>

  <div id="output" style="white-space: pre-wrap; margin-top:10px;"></div>
</div>

<script>
let numbers = [];
let finalText = "";

// đọc file
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;

    // 🔥 file đã là dãy 10 số → chỉ cần tách
    numbers = text.split(/\s+/).filter(s => s.length === 10);

    const input = document.getElementById("filterInput");
    input.focus();

    // đảm bảo mobile bật bàn phím
    setTimeout(() => input.focus(), 200);
  };

  reader.readAsText(file);
});

// lọc + highlight
function processFile() {
  const keyword = document.getElementById("filterInput").value;
  const output = document.getElementById("output");

  if (keyword.length !== 2) {
    alert("Nhập đủ 2 số đi 😐");
    return;
  }

  let html = "";

  numbers.forEach(num => {
    if (num.includes(keyword)) {

      const highlighted = num.replace(
        new RegExp(keyword, "g"),
        `<span class="highlight">${keyword}</span>`
      );

      html += highlighted + "\n";
    }
  });

  finalText = html.replace(/<[^>]+>/g, "");
  output.innerHTML = html || "Không có kết quả";
}

// copy
function copyResult() {
  navigator.clipboard.writeText(finalText);
  alert("Đã copy 😎");
}

// download
function downloadFile() {
  const blob = new Blob([finalText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ketqua.txt";
  a.click();
}
</script>

</body>
</html>
