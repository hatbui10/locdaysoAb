<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Trích Xuất 1 Chữ Số</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --accent: #ffeb3b;
            --border: #444;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .selector-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }

        button.active {
            background: var(--accent);
            color: #000;
        }

        #input-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 60px;
            height: 60px;
            background: #252525;
            border: 2px solid var(--border);
            color: #fff;
            border-radius: 8px;
            font-size: 28px;
            text-align: center;
            caret-color: var(--accent);
        }

        input[type="number"]:focus {
            border-color: var(--accent);
            outline: none;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background: #252525;
            color: #888;
            border: 1px dashed #555;
            border-radius: 6px;
        }

        #result {
            margin-top: 20px;
            background: #000;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            min-height: 100px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            color: #00ff00;
            font-size: 18px;
        }

        .label { font-size: 11px; color: #777; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="label">Bước 1: Chọn File nguồn</div>
    <input type="file" id="fileInput" multiple accept=".txt">

    <div class="label">Bước 2: Chọn số lượng chữ số</div>
    <div class="selector-btns">
        <button onclick="updateMode(1)" id="m1">1 Ô</button>
        <button onclick="updateMode(2)" id="m2">2 Ô</button>
        <button onclick="updateMode(3)" id="m3">3 Ô</button>
    </div>

    <div id="input-container"></div>

    <button onclick="runFilter()" style="width:100%; background: var(--accent); color: black; padding: 15px; border-radius: 8px; font-weight: bold; border: none;">XUẤT DỮ LIỆU</button>

    <div id="result">Đang chờ nhập...</div>
</div>

<script>
    let combinedData = "";

    // Đọc file cộng dồn
    document.getElementById('fileInput').addEventListener('change', function(e) {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => { combinedData += ev.target.result + "\n"; };
            reader.readAsText(file);
        });
    });

    function updateMode(n) {
        const container = document.getElementById('input-container');
        container.innerHTML = "";
        
        [1,2,3].forEach(i => document.getElementById('m'+i).className = (i==n ? 'active' : ''));

        for (let i = 0; i < n; i++) {
            const inp = document.createElement('input');
            inp.type = "number";
            inp.pattern = "[0-9]*";
            inp.inputMode = "numeric";
            inp.className = "single-input";
            
            // Xử lý chỉ nhập 1 số và tự nhảy
            inp.addEventListener('input', function() {
                if (this.value.length > 1) {
                    this.value = this.value.slice(-1); // Chỉ giữ lại số cuối cùng vừa nhập
                }
                if (this.value.length === 1) {
                    const next = this.nextElementSibling;
                    if (next) next.focus();
                }
            });

            // Hỗ trợ xóa (backspace) quay lại ô trước
            inp.addEventListener('keydown', function(e) {
                if (e.key === "Backspace" && this.value === "") {
                    const prev = this.previousElementSibling;
                    if (prev) prev.focus();
                }
            });

            container.appendChild(inp);
        }

        // Tự động focus vào ô đầu tiên khi đổi chế độ
        setTimeout(() => {
            const firstInp = container.querySelector('input');
            if (firstInp) firstInp.focus();
        }, 50);
    }

    function runFilter() {
        const inputs = document.querySelectorAll('.single-input');
        // Gộp tất cả các ô lại thành 1 chuỗi duy nhất (ví dụ: ô1=9, ô2=6 => "96")
        const ab = Array.from(inputs).map(i => i.value).join("");
        const resBox = document.getElementById('result');
        
        if (!combinedData) { alert("Chưa có dữ liệu file!"); return; }
        if (ab === "") { alert("Vui lòng nhập số!"); return; }

        let finalLines = [];
        let pos = 0;

        // Tìm chuỗi ab trong dữ liệu
        while ((pos = combinedData.indexOf(ab, pos)) !== -1) {
            let segment = combinedData.substring(pos, pos + ab.length + 8);
            
            // Lấy 8 ký tự phía sau
            let extra = segment.substring(ab.length); 
            let p1 = extra.substring(0, 4);
            let p2 = extra.substring(4, 8);
            
            // Kết quả: 2 số nhập ở đầu tiên + 8 số sau
            finalLines.push(`${ab}-${p1} ${p2}`);
            pos += 1; // Tìm tiếp các vị trí trùng lặp khác
        }

        resBox.innerText = finalLines.length > 0 ? finalLines.join('\n') : "Không tìm thấy chuỗi '" + ab + "' trong file.";
    }

    // Mặc định
    updateMode(1);
</script>

</body>
</html>
