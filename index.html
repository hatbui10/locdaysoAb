<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sắp xếp & Tách 8 số (2-6)</title>
    <style>
        body {
            margin: 0; padding: 20px; min-height: 100vh;
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            color: #ffffff; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 550px; display: flex; flex-direction: column; }
        .controls { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 10px; width: 100%; }
        
        button, .btn-upload {
            flex: 1; padding: 14px; border-radius: 12px; font-weight: bold;
            border: none; cursor: pointer; transition: 0.2s;
            text-align: center; font-size: 14px;
        }
        .btn-upload { background: #4b6cb7; color: white; display: block; }
        .btn-run { background: #6c5ce7; color: white; }
        .btn-sort { background: #00b894; color: white; }
        .btn-export { background: #e17055; color: white; margin-top: 10px; }
        
        button:hover { filter: brightness(1.2); transform: translateY(-1px); }
        #fileInput { display: none; }

        textarea {
            width: 100%; height: 65vh; margin-top: 15px; border-radius: 15px;
            background: rgba(0, 0, 0, 0.3); color: #00ffcc; border: 1px solid #444;
            padding: 30px; box-sizing: border-box; line-height: 1.8;
            font-family: 'Consolas', monospace; font-size: 16px;
            resize: none; outline: none;
            /* CĂN GIỮA NỘI DUNG */
            text-align: center;
        }
        #status { font-size: 13px; color: #aaa; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <label for="fileInput" class="btn-upload">📁 Tải File Mới</label>
        <input type="file" id="fileInput" accept=".txt">
        <div class="row">
            <button onclick="toOneColumn()" class="btn-run">⚡ Gom cột</button>
            <button onclick="processData()" class="btn-sort">🔢 Tách 8 số (2-6)</button>
        </div>
        <button onclick="exportTxt()" class="btn-export">💾 Xuất File .txt</button>
    </div>

    <textarea id="dataBox" placeholder="Kết quả hiển thị tại đây..."></textarea>
    <div id="status">Sẵn sàng</div>
</div>

<script>
    const dataBox = document.getElementById("dataBox");
    const status = document.getElementById("status");

    // TỰ ĐỘNG KHÔI PHỤC DỮ LIỆU KHI LOAD TRANG
    window.onload = () => {
        const savedData = localStorage.getItem("savedNumbers");
        if (savedData) {
            dataBox.value = savedData;
            status.innerText = "Đã khôi phục dữ liệu từ phiên trước.";
        }
    };

    // Hàm lưu dữ liệu vào localStorage
    function saveData() {
        localStorage.setItem("savedNumbers", dataBox.value);
    }

    document.getElementById("fileInput").addEventListener("change", e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            dataBox.value = e.target.result;
            saveData(); // Lưu ngay khi tải file
            status.innerText = "Đã nhận file mới và lưu vào bộ nhớ.";
        };
        reader.readAsText(file);
    });

    function toOneColumn() {
        let numbers = dataBox.value.match(/\d+/g) || [];
        dataBox.value = numbers.join("\n");
        saveData();
        status.innerText = "Đã đưa về 1 cột.";
    }

    function processData() {
        let raw = dataBox.value;
        let numbers = raw.match(/\d+/g) || [];

        // 1. Lọc trùng và chỉ lấy số có độ dài chính xác 10 chữ số
        let uniqueTenDigits = [...new Set(numbers)].filter(n => n.length === 10);

        // 2. Logic Cửa sổ trượt (Sliding Window)
        let eightDigitSet = new Set();
        uniqueTenDigits.forEach(num => {
            eightDigitSet.add(num.substring(0, 8));
            eightDigitSet.add(num.substring(1, 9));
            eightDigitSet.add(num.substring(2, 10));
        });

        let sortedEightDigits = Array.from(eightDigitSet).sort((a, b) => a.localeCompare(b));

        // 3. Định dạng và gom nhóm
        let finalResult = [];
        let lastPrefix = "";

        sortedEightDigits.forEach(num => {
            let prefix = num.substring(0, 2);
            let middle = num.substring(2);

            if (lastPrefix !== "" && prefix !== lastPrefix) {
                finalResult.push(""); 
            }

            finalResult.push(`${prefix} - ${middle}`);
            lastPrefix = prefix;
        });

        dataBox.value = finalResult.join("\n");
        saveData(); // Lưu kết quả sau khi xử lý

        // HIỂN THỊ BỘ ĐẾM KIỂM TRA ĐỘ CHÍNH XÁC
        status.innerText = `Gốc: ${uniqueTenDigits.length} số -> Tạo ra: ${eightDigitSet.size} dãy 8 số duy nhất.`;
        dataBox.scrollTop = 0;
    }

    function exportTxt() {
        const content = dataBox.value;
        if (!content.trim()) return;
        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "ket_qua_tach_8so.txt";
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
