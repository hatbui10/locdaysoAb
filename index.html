<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lọc số</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 500px;
  background: #111827;
  padding: 20px;
  border-radius: 20px;
}

input, button {
  width: 80%;
  margin: 10px auto 0;
  display: block;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

input {
  text-align: center;
  font-size: 22px;
  letter-spacing: 5px;
  background: #1f2937;
  color: #fff;
}

button {
  background: #6366f1;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

/* 👉 div giả textarea */
.output-box {
  width: 100%;
  height: 260px;
  margin: 15px auto;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #000;
  overflow-y: auto;
  font-family: monospace;
  white-space: pre-wrap;
  color: #ccc;
}

/* 👉 highlight sáng + to */
.highlight {
  color: #00ffcc;
  font-weight: bold;
  font-size: 1.3em;
}
</style>
</head>

<body>

<div class="container">
  <h2 style="text-align:center">🔢 Lọc số</h2>

  <input type="file" id="fileInput">

  <input type="tel"
         id="filterInput"
         placeholder="Nhập 2 số"
         maxlength="2">

  <button onclick="processFile()">🔍 Lọc</button>
  <button onclick="copyResult()">📋 Copy</button>
  <button onclick="downloadFile()">⬇️ Xuất file</button>

  <div id="output" class="output-box">Kết quả sẽ hiện ở đây...</div>
</div>

<script>
let numbers = [];
let finalText = "";

// đọc file
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;

    numbers = text.split(/\s+/).filter(s => s.length === 10);

    const input = document.getElementById("filterInput");
    input.focus();
    setTimeout(() => input.focus(), 200);
  };

  reader.readAsText(file);
});

// lọc
function processFile() {
  const keyword = document.getElementById("filterInput").value;
  const output = document.getElementById("output");

  if (keyword.length !== 2) {
    alert("Nhập đủ 2 số 😐");
    return;
  }

  let html = "";
  let text = "";

  numbers.forEach(num => {
    if (num.includes(keyword)) {

      const highlighted = num.replace(
        new RegExp(keyword, "g"),
        `<span class="highlight">${keyword}</span>`
      );

      html += highlighted + "\n";
      text += num + "\n";
    }
  });

  finalText = text;
  output.innerHTML = html || "Không có kết quả";
}

// copy
function copyResult() {
  navigator.clipboard.writeText(finalText);
  alert("Đã copy 😎");
}

// download
function downloadFile() {
  const blob = new Blob([finalText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ketqua.txt";
  a.click();
}
</script>

</body>
</html>
