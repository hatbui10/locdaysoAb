<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Analyzer Pro - Logic A</title>
   <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-container: #161616;
            --text-main: #e0e0e0;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --danger: #ff5252;
            --surface: #222222;
        }

        body { font-family: 'Consolas', 'Monaco', monospace; padding: 15px; background: var(--bg-body); color: var(--text-main); margin: 0; }
        .container { max-width: 1000px; margin: auto; background: var(--bg-container); padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h2 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-top: 0; }

        .view-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .view-toggle button { background: #333; color: #888; padding: 8px 15px; font-size: 0.8rem; }
        .view-toggle button.active-view { background: #444; color: white; border: 1px solid var(--primary); }

        .controls { background: var(--surface); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        
        .desktop-v .btn-group { flex-direction: row; }
        .desktop-v .btn-group button { flex: 1; min-width: fit-content; }

        .mobile-v .btn-group { flex-direction: column; }
        .mobile-v .btn-group button { width: 100%; padding: 15px; font-size: 1rem; }

        button { 
            padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; 
            font-weight: bold; background: #3d3d3d; color: #bbb; white-space: nowrap; transition: 0.2s;
        }
        /* Nút chọn cụm đang active sẽ có màu cam rực rỡ */
        button.active { background: #ff9800; color: #000; box-shadow: 0 0 12px rgba(255,152,0,0.4); }
        .export-btn { background: var(--secondary); color: #000; }
        .clear-btn { background: #555; color: white; }

        #result { 
    height: 450px; 
    overflow-y: auto; 
    border: 1px solid #222; 
    padding: 15px 5px;    /* Giảm padding trái phải để tối ưu không gian */
    word-break: keep-all; /* Không ngắt chữ giữa chừng */
    font-size: 1.3rem; 
    line-height: 1; 
    background: #050505; 
    border-radius: 6px;
    display: flex;        /* Sử dụng flexbox để kiểm soát dòng tốt hơn */
    flex-wrap: wrap;      /* Cho phép xuống dòng khi đủ 100% width */
    align-content: flex-start;
}


        .num-item { display: inline-block; width: 10%; text-align: center; margin: 10px 0; color: #555; box-sizing: border-box; }
        
        /* Số a: Gạch chân đỏ sát chân số */
        .is-a { 
            color: var(--danger); 
            font-weight: bold; 
            border-bottom: 3px solid var(--danger); 
            display: inline-block;
            line-height: 0.85;
        }

        /* Highlight cụm: Tô nền vàng rực */
        .highlight { 
            background-color: #ffd700 !important; 
            color: #000 !important; 
            border-radius: 2px; 
            box-shadow: 0 0 5px #ffd700;
        }

        .stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-box { flex: 1; background: var(--surface); padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #333; }
        .stat-box b { color: var(--secondary); font-size: 1.1rem; display: block; }
    </style>
</head>
<body id="mainBody" class="desktop-v">

<div class="container">
    <div class="view-toggle">
        <button id="btnVDesktop" onclick="changeView('desktop-v')">💻 MÁY TÍNH</button>
        <button id="btnVMobile" onclick="changeView('mobile-v')">📱 ĐIỆN THOẠI</button>
    </div>

    <h2>Sequence Analyzer <span style="font-size: 0.6em; color: #555;">v5.1</span></h2>

    <div class="controls">
        <strong>📂 Chọn File:</strong> 
        <input type="file" id="fileInput" accept=".txt" style="color: #888; margin-top: 5px; width: 100%;">
        
        <div class="btn-group">
            <button id="size4Btn" onclick="setSize(4)">⚡ Tìm Cụm 4</button>
            <button id="size5Btn" onclick="setSize(5)">💎 Tìm Cụm 5</button>
            <button id="size6Btn" onclick="setSize(6)">🔥 Tìm Cụm 6</button>
            <button class="export-btn" onclick="exportResults()">💾 Xuất Ảnh</button>
            <button class="clear-btn" onclick="clearData()">Xóa hết</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-box">Tổng số: <b id="totalCount">0</b></div>
        <div class="stat-box">Số lượng (a): <b id="aCount">0</b></div>
        <div class="stat-box">Cụm ≥ <span id="labelSize">?</span>: <b id="groupCount">0</b></div>
    </div>

    <div id="result">Hãy tải file .txt để tìm số (a)...</div>
</div>

<script>
    let minGroupSize = 6;
    let rawData = localStorage.getItem('storedData') || "";

    function changeView(viewMode) {
        document.getElementById('mainBody').className = viewMode;
        document.getElementById('btnVDesktop').classList.toggle('active-view', viewMode === 'desktop-v');
        document.getElementById('btnVMobile').classList.toggle('active-view', viewMode === 'mobile-v');
        localStorage.setItem('viewPreference', viewMode);
    }

    window.onload = () => {
        const savedView = localStorage.getItem('viewPreference') || 'desktop-v';
        const savedSize = localStorage.getItem('storedSize');
        
        changeView(savedView);
        if(savedSize) minGroupSize = parseInt(savedSize);
        
        updateUIControls();
        // Load lại dữ liệu cũ nếu có (không hiện thông báo)
        if(rawData) processData(rawData, false); 
    };

    function setSize(size) {
        minGroupSize = size;
        localStorage.setItem('storedSize', size);
        updateUIControls();
        if(rawData) processData(rawData, true);
    }

    function updateUIControls() {
        document.getElementById('size4Btn').classList.toggle('active', minGroupSize === 4);
        document.getElementById('size5Btn').classList.toggle('active', minGroupSize === 5);
        document.getElementById('size6Btn').classList.toggle('active', minGroupSize === 6);
        document.getElementById('labelSize').innerText = minGroupSize;
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            rawData = e.target.result;
            localStorage.setItem('storedData', rawData);
            processData(rawData, true);
        };
        reader.readAsText(file);
    });

    // LOGIC: SỐ (a) LÀ CÁC SỐ THUỘC TRƯỜNG HỢP 1
    function processData(content, showAlert) {
        const nums = content.replace(/\D/g, '').split('').map(Number);
        if (nums.length < 3) return;

        const isA = new Array(nums.length).fill(false);
        let aTotal = 0;

        for (let i = 0; i <= nums.length - 3; i++) {
            // Kiểm tra điều kiện Trường hợp 1
            const match = (nums[i+1] > nums[i] && nums[i+2] < 5) || 
                          (nums[i+1] < nums[i] && nums[i+2] > 5);
            
            // Nếu đúng là TH1 -> Đánh dấu là số (a)
            if (match) { 
                isA[i+2] = true; 
                aTotal++; 
            }
        }

        let highlightIndices = new Set();
        let groupCount = 0;
        let tempGroup = [];

        // Tìm các cụm số (a) đứng liên tiếp
        for (let i = 0; i < isA.length; i++) {
            if (isA[i]) {
                tempGroup.push(i);
            } else {
                if (tempGroup.length >= minGroupSize) {
                    tempGroup.forEach(idx => highlightIndices.add(idx));
                    groupCount++;
                }
                tempGroup = [];
            }
        }
        if (tempGroup.length >= minGroupSize) {
            tempGroup.forEach(idx => highlightIndices.add(idx));
            groupCount++;
        }

        // Cập nhật thống kê
        document.getElementById('totalCount').innerText = nums.length.toLocaleString();
        document.getElementById('aCount').innerText = aTotal.toLocaleString();
        document.getElementById('groupCount').innerText = groupCount.toLocaleString();

        // Render kết quả
        let html = '';
        for (let i = 0; i < nums.length; i++) {
            let classes = ['num-item'];
            if (isA[i]) classes.push('is-a');
            if (highlightIndices.has(i)) classes.push('highlight');
            html += `<span class="${classes.join(' ')}">${nums[i]}</span>`;
        }
        document.getElementById('result').innerHTML = html;

        // Hiện Alert khi người dùng bấm nút hoặc up file
        if (showAlert) {
            setTimeout(() => {
                if (groupCount > 0) alert(`✅ Đã quét xong! Tìm thấy ${groupCount} cụm ${minGroupSize} số (a) thỏa mãn.`);
            }, 50);
        }
    }

    async function exportResults() {
        const resultArea = document.getElementById('result');
        if (!rawData || resultArea.innerText.includes("Hãy tải file")) return;
        
        const shortID = Date.now().toString().slice(-4);
        const fileName = `Export-Cụm${minGroupSize}-${shortID}.png`;

        try {
            const canvas = await html2canvas(resultArea, {
                backgroundColor: "#000000",
                scale: 2,
                height: resultArea.scrollHeight,
                windowHeight: resultArea.scrollHeight,
                onclone: (clonedDoc) => {
                    clonedDoc.getElementById('result').style.height = 'auto';
                    clonedDoc.getElementById('result').style.overflow = 'visible';
                }
            });
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/png");
            link.download = fileName;
            link.click();
        } catch (err) { console.error(err); }
    }

    function clearData() {
        if(confirm("Xóa sạch dữ liệu đã lưu?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
