<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sequence Analyzer Pro - Sharp Edition</title>
    <style>
        :root {
            --bg-body: #0f0f0f;
            --bg-container: #1a1a1a;
            --text-main: #d1d1d1;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --danger: #ff5252;
            --surface: #252525;
        }

        body { font-family: 'Consolas', monospace; padding: 20px; background: var(--bg-body); color: var(--text-main); }
        .container { max-width: 1100px; margin: auto; background: var(--bg-container); padding: 25px; border-radius: 12px; border: 1px solid #333; }
        
        h2 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .controls { background: var(--surface); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #383838; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }

        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; background: #444; color: #ccc; }
        button.active { background: var(--primary); color: #000; box-shadow: 0 0 10px rgba(187,134,252,0.4); }
        .export-btn { background: var(--secondary); color: #000; }
        .clear-btn { background: #555; color: white; }

        #result { 
            height: 500px; overflow-y: auto; border: 1px solid #333; padding: 20px; 
            word-break: break-all; font-size: 1.4rem; line-height: 1.2; /* Line-height thấp để gạch chân sát số */
            background: #050505; border-radius: 8px;
        }

        /* ĐỊNH DẠNG SỐ VÀ GẠCH CHÂN SÁT */
        .num-item { 
            display: inline-block; 
            width: 20px; 
            text-align: center; 
            margin: 8px 2px; /* Khoảng cách giữa các dòng và các số */
            color: #666; 
        }
        
        .is-a { 
            color: var(--danger); 
            font-weight: bold; 
            border-bottom: 3px solid var(--danger); /* Gạch chân sát số */
            line-height: 1; 
            display: inline-block;
        }

        .highlight { 
            background-color: #ffd700 !important; 
            color: #000 !important; 
            border-radius: 2px; 
            box-shadow: 0 0 5px #ffd700;
        }

        .stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-box { flex: 1; background: var(--surface); padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #333; }
        .stat-box b { color: var(--secondary); font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sequence Analyzer <span style="color: #666;">v3.0</span></h2>

    <div class="controls">
        <strong>📂 Chọn File:</strong> <input type="file" id="fileInput" accept=".txt" style="color:#888">
        <div class="btn-group">
            <button id="mode1Btn" onclick="setMode(1)">TH 1: n+1>n & n+2<5</button>
            <button id="mode2Btn" onclick="setMode(2)">TH 2: n+1<n & n+2>5</button>
            <button class="export-btn" onclick="exportResults()">💾 Xuất File</button>
            <button class="clear-btn" onclick="clearData()">Reset</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-box">Tổng số: <b id="totalCount">0</b></div>
        <div class="stat-box">Số loại (a): <b id="aCount">0</b></div>
        <div class="stat-box">Cụm đạt chuẩn: <b id="groupCount">0</b></div>
    </div>

    <div id="result"></div>
</div>

<script>
    let currentMode = 1;
    let rawData = localStorage.getItem('lastData') || "";

    window.onload = () => {
        const savedMode = localStorage.getItem('lastMode');
        if(savedMode) currentMode = parseInt(savedMode);
        updateButtons();
        if(rawData) processData(rawData, false); // false để không hiện alert khi vừa mở trang
    };

    function setMode(mode) {
        currentMode = mode;
        localStorage.setItem('lastMode', mode);
        updateButtons();
        if(rawData) processData(rawData, true);
    }

    function updateButtons() {
        document.getElementById('mode1Btn').className = currentMode === 1 ? 'active' : '';
        document.getElementById('mode2Btn').className = currentMode === 2 ? 'active' : '';
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            rawData = e.target.result;
            localStorage.setItem('lastData', rawData);
            processData(rawData, true);
        };
        reader.readAsText(file);
    });

    function processData(content, showAlert) {
        const nums = content.replace(/\D/g, '').split('').map(Number);
        if (nums.length < 3) return;

        const isA = new Array(nums.length).fill(false);
        let aTotal = 0;

        for (let i = 0; i <= nums.length - 3; i++) {
            let match = (currentMode === 1) 
                ? (nums[i+1] > nums[i] && nums[i+2] < 5)
                : (nums[i+1] < nums[i] && nums[i+2] > 5);
            if (match) { isA[i+2] = true; aTotal++; }
        }

        let highlightIndices = new Set();
        let groupCount = 0;
        let temp = [];
        for (let i = 0; i < isA.length; i++) {
            if (isA[i]) temp.push(i);
            else {
                if (temp.length >= 6) { temp.forEach(idx => highlightIndices.add(idx)); groupCount++; }
                temp = [];
            }
        }
        if (temp.length >= 6) { temp.forEach(idx => highlightIndices.add(idx)); groupCount++; }

        // Update UI
        document.getElementById('totalCount').innerText = nums.length;
        document.getElementById('aCount').innerText = aTotal;
        document.getElementById('groupCount').innerText = groupCount;

        let html = '';
        for (let i = 0; i < nums.length; i++) {
            let cls = ['num-item'];
            if (isA[i]) cls.push('is-a');
            if (highlightIndices.has(i)) cls.push('highlight');
            html += `<span class="${cls.join(' ')}">${nums[i]}</span>`;
        }
        document.getElementById('result').innerHTML = html;

        // THÔNG BÁO
        if (showAlert) {
            setTimeout(() => {
                if (groupCount > 0) {
                    alert(`✅ Hoàn thành! Đã tìm thấy ${groupCount} cụm số hợp lệ (tô vàng).`);
                } else {
                    alert(`❌ Không tìm thấy dãy 6 số "a" liên tiếp nào trong dữ liệu này.`);
                }
            }, 100);
        }
    }

    function exportResults() {
        if (!rawData) return alert("Không có dữ liệu!");
        const blob = new Blob([document.getElementById('result').innerText], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `ket_qua_th${currentMode}.txt`;
        a.click();
    }

    function clearData() {
        if(confirm("Xóa sạch dữ liệu?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
