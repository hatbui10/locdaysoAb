<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quét Số & Cắt Dãy Thông Minh</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; background: #f0f2f5; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-run { background: #007bff; color: white; }
        .btn-down { background: #28a745; color: white; display: none; }
        #output { 
            margin-top: 20px; 
            white-space: pre-wrap; 
            background: #1e1e1e; 
            color: #dcdcdc; 
            padding: 20px; 
            border-radius: 6px; 
            height: 400px; 
            overflow-y: auto;
            line-height: 1.8; /* Tạo độ thưa cho dòng */
        }
        .info { color: #666; font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Trình Quét & Tách Dãy Số</h2>
    
    <div class="input-group">
        <label>1. Chọn tệp dữ liệu số (.txt):</label>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <div class="input-group">
        <label>2. Nhập số cần tìm (0-9):</label>
        <input type="number" id="targetNum" min="0" max="9" value="0">
        <p class="info">* Sau khi tìm thấy số này, hệ thống sẽ lấy ít nhất 6 ký tự tiếp theo rồi mới cắt dòng.</p>
    </div>

    <div class="btn-group">
        <button class="btn-run" onclick="scanNumbers()">Bắt đầu quét</button>
        <button id="downBtn" class="btn-down" onclick="downloadTxt()">Tải tệp kết quả</button>
    </div>

    <div id="output">Kết quả hiển thị tại đây...</div>
</div>

<script>
    let finalResult = "";

    function scanNumbers() {
        const fileInput = document.getElementById('fileInput');
        const target = document.getElementById('targetNum').value;
        const output = document.getElementById('output');
        const downBtn = document.getElementById('downBtn');

        if (!fileInput.files[0]) {
            alert("Vui lòng chọn tệp!");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            // Loại bỏ tất cả khoảng trắng, xuống dòng để có 1 dãy số thuần túy
            const rawText = e.target.result.replace(/\s+/g, '');
            let resultArr = [];
            let currentIndex = 0;

            while (currentIndex < rawText.length) {
                // Tìm vị trí của số mục tiêu tiếp theo kể từ vị trí hiện tại
                let foundIndex = rawText.indexOf(target, currentIndex);

                if (foundIndex === -1) break; // Không tìm thấy nữa thì dừng

                // Kiểm tra xem phần còn lại có đủ ít nhất 1 số mục tiêu + 6 số phía sau không
                // Độ dài tối thiểu cần lấy là 7 (số đó + 6 số sau)
                let endOfSegment = foundIndex + 7;
                
                // Tìm số mục tiêu kế tiếp NHƯNG phải sau ít nhất 6 ký tự
                let nextSearchStart = foundIndex + 7;
                let nextTargetIndex = rawText.indexOf(target, nextSearchStart);

                if (nextTargetIndex !== -1) {
                    // Nếu tìm thấy số tiếp theo, cắt đến tận vị trí đó
                    resultArr.push(rawText.substring(foundIndex, nextTargetIndex));
                    currentIndex = nextTargetIndex;
                } else {
                    // Nếu không còn số nào nữa, lấy hết phần còn lại
                    resultArr.push(rawText.substring(foundIndex));
                    break;
                }
            }

            // Ghi kết quả với 2 lần xuống dòng (\n\n) để tạo khoảng cách thưa
            finalResult = resultArr.join('\n\'); 
            output.textContent = finalResult || "Không tìm thấy dãy thỏa mãn điều kiện.";
            downBtn.style.display = finalResult ? "block" : "none";
        };
        reader.readAsText(fileInput.files[0]);
    }

    function downloadTxt() {
        const blob = new Blob([finalResult], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "ket_qua_quet_so.txt";
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
