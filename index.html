<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzer v24.0 - 3-Tier Layout</title>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-container: #161616;
            --text-main: #e0e0e0;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --surface: #222222;
            --success: #4caf50;
            --warning: #ff9800;
            --blue-light: #03a9f4;
        }

        body { font-family: 'Consolas', 'Monaco', monospace; padding: 10px; background: var(--bg-body); color: var(--text-main); margin: 0; }
        .container { max-width: 600px; margin: auto; background: var(--bg-container); padding: 15px; border-radius: 12px; border: 1px solid #333; }
        
        /* HÀNG 1: UPLOAD FILE */
        .row-file {
            background: var(--surface); padding: 10px; border-radius: 8px; 
            margin-bottom: 10px; border: 1px solid #444; display: flex; justify-content: space-between; align-items: center;
        }

        /* HÀNG 2: HIỂN THỊ MM & Ab */
        .row-display {
            background: var(--surface); padding: 15px; border-radius: 8px;
            margin-bottom: 10px; border: 1px solid #444; display: flex; justify-content: center; gap: 20px;
        }
        .display-item { text-align: center; }
        .display-item label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 4px; }
        .val-box { background: #000; color: var(--secondary); padding: 8px 15px; border-radius: 6px; font-size: 1.6rem; font-weight: bold; min-width: 60px; display: inline-block; border: 1px solid #333; }

        /* HÀNG 3: THỐNG KÊ (TRÁI) & NHẬP N (PHẢI) */
        .row-input-group {
            display: flex; gap: 10px; margin-bottom: 15px; align-items: stretch;
        }
        
        .counter-box {
            flex: 1; background: #000; border: 1px solid #444; border-radius: 8px;
            padding: 10px 15px; display: flex; flex-direction: column; justify-content: center; gap: 5px;
        }
        .counter-line { font-weight: bold; font-size: 1.1rem; display: flex; justify-content: space-between; }
        .c-yellow { color: var(--warning); }
        .c-blue { color: var(--blue-light); }

        .n-input-wrapper {
            background: var(--surface); border: 2px solid var(--primary); border-radius: 8px;
            padding: 10px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .n-input-wrapper label { font-size: 0.7rem; color: var(--primary); margin-bottom: 5px; font-weight: bold; }
        input.n-input {
            background: transparent; border: none; color: #fff; width: 50px; 
            text-align: center; font-size: 2rem; font-weight: bold; outline: none;
        }

        /* KHU VỰC KẾT QUẢ */
        #extractedText {
            width: 100%; height: 400px; background: #000; color: var(--secondary);
            border: 1px solid #444; border-radius: 8px; padding: 12px;
            font-family: 'Consolas', monospace; font-size: 1.3rem; resize: vertical; line-height: 1.5;
            box-sizing: border-box;
        }

        .copy-btn { background: var(--success); color: white; width: 100%; margin-top: 10px; padding: 15px; font-size: 1.1rem; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .clear-btn { background: #444; color: #aaa; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="row-file">
        <input type="file" id="fileInput" accept=".txt" style="font-size: 0.8rem; color: #888;">
        <button class="clear-btn" onclick="clearData()">Xóa bộ nhớ</button>
    </div>

    <div class="row-display">
        <div class="display-item">
            <label>MM</label>
            <div id="mmVal" class="val-box">--</div>
        </div>
        <div class="display-item">
            <label>Ab</label>
            <div id="abVal" class="val-box">--</div>
        </div>
    </div>

    <div class="row-input-group">
        <div class="counter-box">
            <div class="counter-line c-yellow">
                <span>🟡 Lớn:</span> <span id="countYellow">0</span>
            </div>
            <div class="counter-line c-blue">
                <span>🔵 Nhỏ:</span> <span id="countBlue">0</span>
            </div>
        </div>
        <div class="n-input-wrapper">
            <label>NHẬP N</label>
            <input type="tel" id="inputN" class="n-input" placeholder="?" maxlength="1" inputmode="numeric" autocomplete="off">
        </div>
    </div>
    
    <textarea id="extractedText" readonly placeholder="Kết quả trích xuất..."></textarea>
    
    <button class="copy-btn" onclick="copyExtracted()">SAO CHÉP KẾT QUẢ</button>
</div>

<script>
    const STORAGE_KEY = 'sequence_analyzer_data';
    let rawData = "";
    let currentNumbers = []; 

    const nInput = document.getElementById('inputN');
    const mmBox = document.getElementById('mmVal');
    const abBox = document.getElementById('abVal');

    window.onload = () => {
        rawData = localStorage.getItem(STORAGE_KEY) || "";
        nInput.focus();
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'fileInput' && e.target.className !== 'copy-btn') nInput.focus();
        });
    };

    nInput.addEventListener('input', function() {
        const val = this.value.trim();
        if (val !== "" && !isNaN(val)) {
            currentNumbers.push(val);
            if (currentNumbers.length > 4) currentNumbers.shift();
            
            updateDisplay();

            if (currentNumbers.length === 4) {
                extractSequences();
            }
        }
        this.value = "";
    });

    function updateDisplay() {
        let m1 = currentNumbers[currentNumbers.length - 4] || "";
        let m2 = currentNumbers[currentNumbers.length - 3] || "";
        let a1 = currentNumbers[currentNumbers.length - 2] || "";
        let a2 = currentNumbers[currentNumbers.length - 1] || "";

        mmBox.innerText = (m1 + m2) || "--";
        abBox.innerText = (a1 + a2) || "--";
    }

    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        rawData = await file.text();
        localStorage.setItem(STORAGE_KEY, rawData);
        alert("Đã nạp file thành công!");
        currentNumbers = [];
        updateDisplay();
        nInput.focus();
    });

    function extractSequences() {
        const mm = mmBox.innerText;
        const ab = abBox.innerText;
        const textArea = document.getElementById('extractedText');

        if (mm === "--" || ab === "--") return;

        const nums = rawData.replace(/\D/g, '').split('').map(Number);
        let blocks = { AA: [], AB: [], BB: [], BA: [] };
        const isA = (n) => n >= 5;
        const isB = (n) => n < 5;

        for (let i = 0; i <= nums.length - 8; i++) {
            if (nums[i] === parseInt(mm[0]) && nums[i+1] === parseInt(mm[1])) {
                let d = nums.slice(i, i + 8);
                let lastFour = d.slice(4);
                let colorTag = "⚪ ";
                if (lastFour.every(n => isA(n))) colorTag = "🟡 ";
                else if (lastFour.every(n => isB(n))) colorTag = "🔵 ";

                let formatted = `${colorTag}${d[0]}${d[1]} - ${d[2]}${d[3]} - ${d[4]}${d[5]} ${d[6]}${d[7]}`;
                if (isA(d[2]) && isA(d[3])) blocks.AA.push(formatted);
                else if (isA(d[2]) && isB(d[3])) blocks.AB.push(formatted);
                else if (isB(d[2]) && isB(d[3])) blocks.BB.push(formatted);
                else if (isB(d[2]) && isA(d[3])) blocks.BA.push(formatted);
            }
        }

        const n2 = parseInt(ab[0]), n3 = parseInt(ab[1]);
        let target = (isA(n2) && isA(n3)) ? "AA" : (isA(n2) && isB(n3)) ? "AB" : (isB(n2) && isB(n3)) ? "BB" : "BA";
        
        textArea.value = blocks[target].length > 0 
            ? `[ KHỐI ${target} ] (MM:${mm} Ab:${ab})\n` + blocks[target].join('\n') 
            : `KHÔNG CÓ DỮ LIỆU KHỐI ${target}`;

        document.getElementById('countYellow').innerText = (textArea.value.match(/🟡/g) || []).length;
        document.getElementById('countBlue').innerText = (textArea.value.match(/🔵/g) || []).length;
    }

    function copyExtracted() {
        const textArea = document.getElementById('extractedText');
        if (!textArea.value) return;
        textArea.select();
        document.execCommand('copy');
        alert("Đã sao chép!");
    }

    function clearData() {
        if(confirm("Xóa toàn bộ dữ liệu?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
